# =============================================================================
# OCX Python Services — CI/CD Pipeline
# =============================================================================
# All pushes → dev. Test/prod via manual dispatch only.
# All 7 services deployed in every environment (scale-to-zero).
# =============================================================================

name: Deploy Python Services

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/deploy-python-services.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]
      service:
        description: 'Service to deploy (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - trust-registry
          - activity-registry
          - process-mining
          - evidence-vault
          - authority
          - jury
          - ledger

env:
  GCP_REGION: us-central1

jobs:
  # ── Resolve Environment ───────────────────────────────────────────────────
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
      suffix: ${{ steps.resolve.outputs.suffix }}
      min_instances: ${{ steps.resolve.outputs.min_instances }}
      max_instances: ${{ steps.resolve.outputs.max_instances }}
      memory: ${{ steps.resolve.outputs.memory }}
    steps:
      - id: resolve
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="dev"
          fi
          echo "env_name=$ENV" >> $GITHUB_OUTPUT
          case $ENV in
            prod)
              echo "suffix=" >> $GITHUB_OUTPUT
              echo "min_instances=1" >> $GITHUB_OUTPUT
              echo "max_instances=5" >> $GITHUB_OUTPUT
              echo "memory=1Gi" >> $GITHUB_OUTPUT
              ;;
            test)
              echo "suffix=-test" >> $GITHUB_OUTPUT
              echo "min_instances=0" >> $GITHUB_OUTPUT
              echo "max_instances=2" >> $GITHUB_OUTPUT
              echo "memory=512Mi" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "suffix=-dev" >> $GITHUB_OUTPUT
              echo "min_instances=0" >> $GITHUB_OUTPUT
              echo "max_instances=1" >> $GITHUB_OUTPUT
              echo "memory=512Mi" >> $GITHUB_OUTPUT
              ;;
          esac

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -v || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ── Build & Deploy ────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy (${{ needs.resolve-env.outputs.env_name }})
    needs: [resolve-env, test]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.env_name }}
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: ocx-trust-registry,    dir: trust-registry,    port: "8001" }
          - { name: ocx-jury,             dir: jury,              port: "8002" }
          - { name: ocx-ledger,           dir: ledger,            port: "8003" }
          - { name: ocx-activity-registry, dir: activity-registry, port: "8004" }
          - { name: ocx-evidence-vault,    dir: evidence-vault,    port: "8005" }
          - { name: ocx-authority,         dir: authority,         port: "8006" }
          - { name: ocx-process-mining,    dir: process-mining,    port: "8007" }

    env:
      IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ matrix.service.name }}

    steps:
      - uses: actions/checkout@v4

      # Skip if a specific service was requested and this isn't it
      - name: Check if this service should deploy
        id: check
        run: |
          REQUESTED="${{ github.event.inputs.service }}"
          CURRENT="${{ matrix.service.dir }}"
          if [ -z "$REQUESTED" ] || [ "$REQUESTED" = "all" ] || [ "$REQUESTED" = "$CURRENT" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping $CURRENT (requested: $REQUESTED)"
          fi

      - id: auth
        if: steps.check.outputs.should_deploy == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - if: steps.check.outputs.should_deploy == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        if: steps.check.outputs.should_deploy == 'true'
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:${{ needs.resolve-env.outputs.env_name }}-latest \
            -f ${{ matrix.service.dir }}/Dockerfile \
            ${{ matrix.service.dir }}

      - name: Push Docker image
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:${{ needs.resolve-env.outputs.env_name }}-latest

      - name: Deploy ${{ matrix.service.name }}
        if: steps.check.outputs.should_deploy == 'true'
        env:
          SUFFIX: ${{ needs.resolve-env.outputs.suffix }}
          ENV_NAME: ${{ needs.resolve-env.outputs.env_name }}
          MEMORY: ${{ needs.resolve-env.outputs.memory }}
          MIN_INST: ${{ needs.resolve-env.outputs.min_instances }}
          MAX_INST: ${{ needs.resolve-env.outputs.max_instances }}
        run: |
          SERVICE_NAME="${{ matrix.service.name }}${SUFFIX}"
          echo "🚀 Deploying $SERVICE_NAME [${ENV_NAME}]"

          gcloud run deploy "$SERVICE_NAME" \
            --image=$IMAGE_NAME:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --ingress=internal-and-cloud-load-balancing \
            --set-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},POSTGRES_HOST=${{ secrets.POSTGRES_HOST }},POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }},POSTGRES_USER=${{ secrets.POSTGRES_USER }},POSTGRES_DB=${{ vars.POSTGRES_DB || 'postgres' }},POSTGRES_PORT=${{ vars.POSTGRES_PORT || '5432' }},DB_BACKEND=postgresql,OCX_ENV=${ENV_NAME},PORT=${{ matrix.service.port }}" \
            --memory=$MEMORY \
            --cpu=1 \
            --min-instances=$MIN_INST \
            --max-instances=$MAX_INST

      - name: Verify
        if: steps.check.outputs.should_deploy == 'true'
        env:
          SUFFIX: ${{ needs.resolve-env.outputs.suffix }}
        run: |
          SERVICE_NAME="${{ matrix.service.name }}${SUFFIX}"
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "✅ $SERVICE_NAME: $SERVICE_URL"
