# =============================================================================
# OCX Python Services — CI/CD (Dev)
# =============================================================================
# Test, deploy (if changed), and verify
# =============================================================================

name: CI/CD Python Services (Dev)

on:
  workflow_dispatch:

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  DEPLOY_ENV: dev
  ENV_SUFFIX: -dev

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: ocx-trust-registry,    dir: trust-registry }
          - { name: ocx-jury,             dir: jury }
          - { name: ocx-ledger,           dir: ledger }
          - { name: ocx-activity-registry, dir: activity-registry }
          - { name: ocx-evidence-vault,    dir: evidence-vault }
          - { name: ocx-authority,         dir: authority }
          - { name: ocx-process-mining,    dir: process-mining }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Compare deployed vs current
        id: check
        run: |
          SVC="${{ matrix.service.name }}${{ env.ENV_SUFFIX }}"
          CURRENT_SHA=$(git rev-parse --short HEAD)

          DEPLOYED_TAG=$(gcloud run services describe "$SVC" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(spec.template.spec.containers[0].image)' 2>/dev/null | grep -oP ':\K[^:]+$' || echo "NOT_DEPLOYED")

          if [ "$DEPLOYED_TAG" = "$CURRENT_SHA" ]; then
            echo "✅ $SVC — no changes"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "🔄 $SVC — changes detected (deployed: $DEPLOYED_TAG, current: $CURRENT_SHA)"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: Test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  deploy:
    name: Deploy (if changed)
    needs: [detect-changes, ci]
    if: contains(needs.detect-changes.outputs.has_changes, 'true')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Run deploy.sh
        run: |
          chmod +x deploy.sh
          ./deploy.sh all ${{ env.DEPLOY_ENV }} ${{ env.GCP_REGION }}
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  verify:
    name: Verify Deployments
    needs: [ci, deploy]
    if: always() && needs.ci.result == 'success'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        service:
          - ocx-trust-registry
          - ocx-jury
          - ocx-ledger
          - ocx-activity-registry
          - ocx-evidence-vault
          - ocx-authority
          - ocx-process-mining
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Check ${{ matrix.service }}${{ env.ENV_SUFFIX }}
        run: |
          SVC="${{ matrix.service }}${{ env.ENV_SUFFIX }}"
          STATUS=$(gcloud run services describe "$SVC" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.conditions[0].status)' 2>/dev/null || echo "NOT_FOUND")

          if [ "$STATUS" = "True" ]; then
            URL=$(gcloud run services describe "$SVC" \
              --region=${{ env.GCP_REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --format='value(status.url)')
            echo "✅ $SVC: $URL"
          else
            echo "⚠️  $SVC not deployed. Run: ./deploy.sh $(echo ${{ matrix.service }} | sed 's/ocx-//') ${{ env.DEPLOY_ENV }}"
          fi
